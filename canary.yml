apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-app-canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: node-app
      version: v2
  template:
    metadata:
      labels:
        app: node-app
        version: v2
    spec:
      containers:
      - name: node-app
        image: yekqpapp4q/app:latest
        ports:
        - containerPort: 3000
